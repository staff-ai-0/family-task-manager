# Family Task Manager — Staging OVERRIDE
# =============================================================================
# This is a REAL compose override layered ON TOP of docker-compose.yml. It does
# NOT redefine the stack — it inherits every service, image and build from the
# base file and only changes what must differ so a staging stack can run on the
# SAME host as local dev without colliding: project name, container names, host
# ports, and (via the project name) isolated volumes + network.
#
# There is NO Actual Budget server and NO PM2 here — the budget system is native
# PostgreSQL (Actual was decommissioned in Phase 10) and the app runs as normal
# containers, not under a process manager. The previous contents of this file
# were stale fiction referencing both; this replaces them.
#
# ---------------------------------------------------------------------------
# Usage
# ---------------------------------------------------------------------------
#   # Bring staging up (base + this override; project name comes from `name:`)
#   docker compose -f docker-compose.yml -f docker-compose.stage.yml up -d
#   # (podman:) podman compose -f docker-compose.yml -f docker-compose.stage.yml up -d
#
#   docker compose -f docker-compose.yml -f docker-compose.stage.yml ps
#   docker compose -f docker-compose.yml -f docker-compose.stage.yml down
#
# Because `name: family-stage` sets a distinct compose project, its volumes and
# default network are automatically namespaced (family-stage_postgres_data,
# family-stage_default, …) — fully isolated from the local-dev project. Container
# names and host ports are NOT project-namespaced, so we override those below.
#
# Staging URLs (host ports, all offset from dev to avoid clashes):
#   Frontend  http://localhost:3013   Backend   http://localhost:8013/docs
#   Postgres  localhost:5443          Test DB   localhost:5445   Redis  localhost:6390
#
# Put staging secrets in `.env.stage` and pass `--env-file .env.stage` if you
# want them separate from the dev `.env`.
# =============================================================================

name: family-stage

services:
  db:
    container_name: family_stage_db
    ports:
      - "${STAGE_DB_PORT:-5443}:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  test_db:
    container_name: family_stage_test_db
    ports:
      - "${STAGE_TEST_DB_PORT:-5445}:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    container_name: family_stage_redis
    ports:
      - "${STAGE_REDIS_PORT:-6390}:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    container_name: family_stage_backend
    ports:
      - "${STAGE_BACKEND_PORT:-8013}:8000"
    environment:
      # Point CORS + email links at the staging frontend host port. Internal
      # service DNS (db/redis/backend) is unchanged — each compose project gets
      # its own bridge network, so `db`/`redis` still resolve within staging.
      ALLOWED_ORIGINS: http://localhost:3013,http://localhost:8013
      DEBUG: ${DEBUG:-true}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: family_stage_frontend
    ports:
      - "${STAGE_FRONTEND_PORT:-3013}:3000"
    environment:
      # SSR → backend stays on the internal network alias.
      API_BASE_URL: http://backend:8000
      # Browser-facing base must hit the staging backend host port.
      PUBLIC_API_BASE_URL: http://localhost:8013
      PORT: 3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
