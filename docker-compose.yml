version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: family_app_db
    environment:
      POSTGRES_DB: familyapp
      POSTGRES_USER: familyapp
      POSTGRES_PASSWORD: familyapp123
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U familyapp" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Test Database (separate from production)
  test_db:
    image: postgres:15-alpine
    container_name: family_app_test_db
    environment:
      POSTGRES_DB: familyapp_test
      POSTGRES_USER: familyapp_test
      POSTGRES_PASSWORD: familyapp_test123
    ports:
      - "5435:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U familyapp_test" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: family_app_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Backend API (production mode)
  #
  # Uses the Dockerfile CMD (uvicorn without --reload). Source code is baked
  # into the image at build time — no host bind mounts, so a git pull on the
  # host does NOT hot-swap the running process. To pick up code changes in
  # prod, rebuild the image (`docker compose build --no-cache backend`) and
  # recreate the container (`docker compose up -d --force-recreate backend`).
  #
  # Local development should run outside docker (see CLAUDE.md: `uvicorn
  # --reload` + `npm run dev` directly) or use a gitignored
  # docker-compose.override.yml with bind mounts and the --reload command.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family_app_backend
    environment:
      # --- Vault bootstrap (required for prod, optional for local dev) ---
      # vault_bootstrap.py reads the KV v2 path at container start and folds
      # the secrets into os.environ before pydantic Settings() runs. Any key
      # already present here is NOT overwritten by Vault, so the values below
      # (DB URL, ALLOWED_ORIGINS, etc.) remain the source of truth for ops
      # config that needs to match compose networking.
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_PATH: ${VAULT_PATH:-family-task-manager/prod}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      # --- Infra config (compose owns these, Vault values are ignored) ---
      DATABASE_URL: postgresql+asyncpg://familyapp:familyapp123@db:5432/familyapp
      TEST_DATABASE_URL: postgresql+asyncpg://familyapp_test:familyapp_test123@test_db:5432/familyapp_test
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3003,http://localhost:8000,https://family.agent-ia.mx
      DEBUG: ${DEBUG:-false}
      # --- Non-secret operational defaults ---
      # These can be overridden by Vault (they're not pre-set in compose).
      # Anything NOT listed here (SECRET_KEY, JWT_SECRET_KEY, GOOGLE_CLIENT_*,
      # PAYPAL_*, RESEND_API_KEY, ANTHROPIC_API_KEY, BASE_URL, ...) is fetched
      # from Vault exclusively — no compose-side leak of secrets.
    ports:
       - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      test_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # Frontend Web Interface (production mode)
  #
  # Uses the multi-stage Dockerfile: build stage runs `npm run build`, runtime
  # stage runs `node ./dist/server/entry.mjs`. No dev server, no HMR, no bind
  # mounts. The build context is the repo root (not ./frontend) so the
  # Dockerfile can COPY both frontend/ and docs/ — the docs/ tree contains
  # USER_GUIDE_{EN,ES}.md which src/pages/help.astro and ayuda.astro import
  # and render as the hosted user guide.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: family_app_frontend
    environment:
      API_BASE_URL: http://backend:8000
      PUBLIC_API_BASE_URL: http://localhost:8003
      PORT: 3000
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  # Sync Service (DEPRECATED - PostgreSQL-based budget system replaces Actual Budget)
  # This service has been decommissioned in Phase 10 as all Actual Budget
  # functionality has been migrated to the internal PostgreSQL budget system.
  # To re-enable: uncomment below and run: docker-compose up sync-service -d
  # sync-service:
  #   build:
  #     context: ./services/actual-budget
  #     dockerfile: Dockerfile.sync
  #   container_name: family_sync_service
  #   environment:
  #     # Database configuration
  #     DB_HOST: db
  #     DB_PORT: 5432
  #     DB_NAME: familyapp
  #     DB_USER: familyapp
  #     DB_PASSWORD: familyapp123
  #     # Family API configuration
  #     FAMILY_API_URL: http://backend:8000
  #     FAMILY_API_EMAIL: ${FAMILY_API_EMAIL:-mom@demo.com}
  #     FAMILY_API_PASSWORD: ${FAMILY_API_PASSWORD:-password123}
  #     # Conversion rate
  #     POINTS_TO_MONEY_RATE: ${POINTS_TO_MONEY_RATE:-0.10}
  #     POINTS_TO_MONEY_CURRENCY: ${POINTS_TO_MONEY_CURRENCY:-MXN}
  #   ports:
  #     - "5008:5008"
  #   depends_on:
  #     backend:
  #       condition: service_started
  #     db:
  #       condition: service_healthy
  #   volumes:
  #     - ./services/actual-budget:/app
  #   restart: unless-stopped
  #   networks:
  #     - app_network

volumes:
  postgres_data:
  test_postgres_data:


networks:
  app_network:
    driver: bridge
